<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Toybox Deck Settings</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #202020;
            --panel: #2b2b2b;
            --panel-2: #303030;
            --panel-hover: #383838;
            --border: #474747;
            --border-soft: #3a3a3a;
            --text: #f3f3f3;
            --text-muted: #b8b8b8;
            --text-dim: #8f8f8f;
            --accent: #4cc2ff;
            --accent-strong: #60cdff;
            --accent-bg: #07324a;
            --danger: #ff8c8c;
        }

        * {
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        html,
        body {
            width: 100%;
            min-width: 0;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            padding: 14px 20px 14px 12px;
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            font-size: 12px;
            color: var(--text);
            background: var(--bg);
        }

        .shell {
            width: min(392px, 100%);
            max-width: 100%;
            min-width: 0;
            margin: 0;
        }

        .topbar {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 2px 0 12px;
        }

        .app-icon,
        .item-icon {
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, #343434, #262626);
            color: var(--accent-strong);
            font-weight: 700;
        }

        .app-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            font-size: 14px;
        }

        .title {
            flex: 1 1 auto;
            min-width: 0;
        }

        h1 {
            margin: 0;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            line-height: 1.25;
        }

        .status {
            margin-top: 2px;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .icon-button {
            flex: 0 0 32px;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            color: var(--text);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0;
        }

        .icon-button:hover {
            background: var(--panel-hover);
            border-color: #5a5a5a;
        }

        .search {
            position: relative;
            margin-bottom: 10px;
        }

        .search input {
            width: 100%;
            height: 34px;
            padding: 7px 34px 7px 10px;
            color: var(--text);
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 4px;
            font: inherit;
        }

        .search input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: inset 0 -1px 0 var(--accent);
        }

        .search-mark {
            position: absolute;
            right: 10px;
            top: 7px;
            color: var(--text-dim);
            font-size: 13px;
            pointer-events: none;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding-bottom: 2px;
        }

        .filter {
            flex: 0 0 auto;
            height: 28px;
            padding: 0 10px;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font: inherit;
        }

        .filter:hover {
            color: var(--text);
            background: var(--panel-hover);
        }

        .filter.active {
            color: var(--text);
            background: var(--accent-bg);
            border-color: #357a9f;
        }

        .content {
            display: grid;
            gap: 10px;
        }

        .list {
            max-height: 292px;
            overflow: auto;
            border: 1px solid var(--border-soft);
            border-radius: 6px;
            background: #242424;
        }

        .item {
            position: relative;
            width: 100%;
            display: grid;
            grid-template-columns: 32px 1fr auto;
            gap: 9px;
            align-items: center;
            min-height: 56px;
            padding: 8px 10px;
            color: var(--text);
            background: transparent;
            border: 0;
            border-bottom: 1px solid var(--border-soft);
            text-align: left;
            cursor: pointer;
            font: inherit;
        }

        .item-radio {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .item:last-child {
            border-bottom: 0;
        }

        .item:hover {
            background: var(--panel-hover);
        }

        .item:focus-within {
            outline: 1px solid var(--accent-strong);
            outline-offset: -2px;
        }

        .item.selected {
            background: #12384a;
            box-shadow: inset 3px 0 0 var(--accent-strong);
        }

        .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-size: 11px;
            letter-spacing: 0;
        }

        .item-main {
            min-width: 0;
        }

        .item-name {
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            margin-top: 2px;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            justify-self: end;
            max-width: 76px;
            padding: 3px 6px;
            color: #dff6ff;
            background: #244556;
            border: 1px solid #37647a;
            border-radius: 4px;
            font-size: 10px;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty {
            padding: 18px 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }

        .empty-title {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
        }

        .empty-copy {
            margin-top: 6px;
        }

        .empty-path {
            margin-top: 10px;
            padding: 7px 8px;
            color: var(--text-dim);
            background: #1f1f1f;
            border: 1px solid var(--border-soft);
            border-radius: 4px;
            font-size: 10px;
            line-height: 1.35;
            overflow-wrap: anywhere;
            text-align: left;
        }

        .empty-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .empty-link {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            color: #dff6ff;
            background: var(--accent-bg);
            border: 1px solid #357a9f;
            border-radius: 4px;
            text-decoration: none;
            font: inherit;
        }

        .empty-link:hover {
            background: #0a405f;
        }

        .details {
            border: 1px solid var(--border-soft);
            border-radius: 6px;
            background: var(--panel);
            overflow: hidden;
        }

        .key-setup {
            margin-bottom: 10px;
            border: 1px solid var(--border-soft);
            border-radius: 6px;
            background: var(--panel);
            overflow: hidden;
        }

        .key-setup-head {
            display: grid;
            grid-template-columns: 32px 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-soft);
            background: var(--panel-2);
        }

        .key-setup-body {
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .details-head {
            display: grid;
            grid-template-columns: 32px 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-soft);
            background: var(--panel-2);
        }

        .details-title {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.25;
        }

        .details-subtitle {
            margin-top: 2px;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.25;
        }

        .details-body {
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .kv {
            display: grid;
            grid-template-columns: 76px 1fr;
            gap: 8px;
            align-items: start;
        }

        .kv-label {
            color: var(--text-dim);
        }

        .kv-value {
            min-width: 0;
            color: var(--text);
            word-break: break-word;
        }

        .title-control {
            display: grid;
            grid-template-columns: 76px 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            line-height: 1.3;
        }

        .toggle-row input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-strong);
        }

        .title-input {
            min-width: 0;
            width: 100%;
            height: 30px;
            padding: 6px 8px;
            color: var(--text);
            background: #242424;
            border: 1px solid var(--border);
            border-radius: 4px;
            font: inherit;
        }

        .title-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: inset 0 -1px 0 var(--accent);
        }

        .title-input:disabled {
            color: var(--text-dim);
            opacity: .72;
        }

        .small-button {
            height: 30px;
            padding: 0 10px;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font: inherit;
        }

        .small-button:hover {
            background: var(--panel-hover);
        }

        .small-button:disabled {
            color: var(--text-dim);
            cursor: default;
            opacity: .65;
        }

        .hint {
            color: var(--text-muted);
            line-height: 1.4;
        }

        .danger {
            color: var(--danger);
        }

        @media (max-width: 330px) {
            body {
                padding: 10px;
            }

            .topbar {
                grid-template-columns: 34px 1fr auto;
            }

            .item {
                grid-template-columns: 30px 1fr;
            }

            .badge {
                grid-column: 2;
                justify-self: start;
                margin-top: -2px;
            }

            .title-control {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="app-icon">PT</div>
            <div class="title">
                <h1>Power Toybox Deck</h1>
                <div id="status" class="status">Loading PowerToys settings</div>
            </div>
            <button id="refreshBtn" class="icon-button" type="button" title="Refresh catalog" aria-label="Refresh catalog">&#8635;</button>
        </header>

        <section id="keySetup" class="key-setup" aria-label="Current key setup"></section>

        <div class="search">
            <input id="searchBox" type="search" placeholder="Search PowerToys" autocomplete="off">
            <span class="search-mark">/</span>
        </div>

        <nav id="filters" class="filters" aria-label="PowerToys command filters"></nav>
        <main class="content">
            <section id="commandList" class="list" role="radiogroup" aria-label="PowerToys commands"></section>
            <section id="details" class="details" aria-label="Selected command details"></section>
        </main>
    </div>

    <script>
        let websocket = null;
        let uuid = null;
        let actionInfo = null;
        let settings = {};
        let catalog = { items: [] };
        let activeFilter = 'all';
        let titleSaveTimer = null;

        const filters = [
            { id: 'all', label: 'All' },
            { id: 'utility', label: 'Quick Access' },
            { id: 'hotkey', label: 'Hotkeys' },
            { id: 'run', label: 'Run' },
            { id: 'cmdpal', label: 'CmdPal' },
            { id: 'keyboard', label: 'Keyboard' },
        ];

        const searchBox = document.getElementById('searchBox');
        const commandList = document.getElementById('commandList');
        const refreshBtn = document.getElementById('refreshBtn');
        const details = document.getElementById('details');
        const keySetup = document.getElementById('keySetup');
        const status = document.getElementById('status');
        const filtersNode = document.getElementById('filters');

        window.connectElgatoStreamDeckSocket = function(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
            uuid = inUUID;
            actionInfo = JSON.parse(inActionInfo);
            settings = actionInfo.payload.settings || {};

            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function() {
                websocket.send(JSON.stringify({ event: inRegisterEvent, uuid }));
                requestSettings();
                requestCatalog();
            };

            websocket.onmessage = function(evt) {
                let message;
                try {
                    message = JSON.parse(evt.data);
                } catch (error) {
                    return;
                }

                if (message.event === 'didReceiveSettings') {
                    settings = message.payload?.settings || {};
                    render();
                }

                if (message.event === 'sendToPropertyInspector' && message.payload?.type === 'catalog') {
                    catalog = message.payload.catalog || { items: [] };
                    settings = message.payload.settings || settings || {};
                    render();
                    status.textContent = catalogStatusText();
                }
            };

            render();
        };

        function requestSettings() {
            if (!isReady()) return;
            websocket.send(JSON.stringify({
                event: 'getSettings',
                action: actionInfo.action,
                context: uuid
            }));
        }

        function requestCatalog() {
            if (!isReady()) return;
            status.textContent = 'Syncing PowerToys settings';
            websocket.send(JSON.stringify({
                event: 'sendToPlugin',
                action: actionInfo.action,
                context: uuid,
                payload: { type: 'getCatalog' }
            }));
        }

        function saveSettings() {
            if (!isReady()) return;
            websocket.send(JSON.stringify({
                event: 'setSettings',
                action: actionInfo.action,
                context: uuid,
                payload: settings
            }));
            websocket.send(JSON.stringify({
                event: 'sendToPlugin',
                action: actionInfo.action,
                context: uuid,
                payload: {
                    type: 'settingsChanged',
                    settings
                }
            }));
        }

        function render() {
            const selected = settings.itemId || '';
            const selectedItem = (catalog.items || []).find(item => item.id === selected);
            const items = filteredItems();

            renderKeySetup(selectedItem);
            renderFilters();

            commandList.innerHTML = '';

            if (selected && selectedItem && !items.some(item => item.id === selected)) {
                commandList.appendChild(renderItem(selectedItem, true, true));
            }

            if (!items.length && !(selected && selectedItem)) {
                commandList.appendChild(renderEmptyState());
            }

            for (const item of items) {
                commandList.appendChild(renderItem(item, item.id === selected, false));
            }

            renderDetails(selectedItem);
        }

        function renderKeySetup(item) {
            if (!settings.itemId) {
                if (powerToysUnavailable()) {
                    keySetup.innerHTML = `
                        <div class="key-setup-head">
                            <div class="item-icon">PT</div>
                            <div>
                                <div class="details-title danger">PowerToys not found</div>
                                <div class="details-subtitle">Install or open PowerToys once, then refresh.</div>
                            </div>
                        </div>
                        <div class="key-setup-body">
                            <div class="hint">No command can be selected until PowerToys settings are available.</div>
                        </div>
                    `;
                    return;
                }

                keySetup.innerHTML = `
                    <div class="key-setup-head">
                        <div class="item-icon">PT</div>
                        <div>
                            <div class="details-title">No command selected</div>
                            <div class="details-subtitle">Choose a PowerToys command below.</div>
                        </div>
                    </div>
                    <div class="key-setup-body">
                        <div class="hint">Title controls will appear here after selecting a command.</div>
                    </div>
                `;
                return;
            }

            if (!item) {
                if (powerToysUnavailable()) {
                    keySetup.innerHTML = `
                        <div class="key-setup-head">
                            <div class="item-icon">!</div>
                            <div>
                                <div class="details-title danger">PowerToys not found</div>
                                <div class="details-subtitle">This key needs PowerToys settings to resolve its command.</div>
                            </div>
                        </div>
                        <div class="key-setup-body">
                            <div class="hint">Install or open PowerToys once, then refresh this catalog.</div>
                        </div>
                    `;
                    return;
                }

                keySetup.innerHTML = `
                    <div class="key-setup-head">
                        <div class="item-icon">!</div>
                        <div>
                            <div class="details-title danger">Missing command</div>
                            <div class="details-subtitle">This saved PowerToys item is unavailable.</div>
                        </div>
                    </div>
                    <div class="key-setup-body">
                        <div class="hint">Pick another command below to repair this key.</div>
                    </div>
                `;
                return;
            }

            keySetup.innerHTML = `
                <div class="key-setup-head">
                    <div class="item-icon">${escapeHtml(itemInitials(item))}</div>
                    <div>
                        <div class="details-title">${escapeHtml(item.title)}</div>
                        <div class="details-subtitle">${escapeHtml(item.group)} - ${escapeHtml(item.source)}</div>
                    </div>
                </div>
                <div class="key-setup-body">
                    <label class="toggle-row">
                        <input id="showTitleInput" type="checkbox"${titleVisible() ? ' checked' : ''}>
                        <span>Show title</span>
                    </label>
                    <div class="title-control">
                        <div class="kv-label">Title</div>
                        <input id="titleInput" class="title-input" type="text" value="${escapeHtml(displayTitle(item))}" placeholder="${escapeHtml(item.shortTitle)}" autocomplete="off"${titleVisible() ? '' : ' disabled'}>
                        <button id="resetTitleBtn" class="small-button" type="button"${canResetTitle() ? '' : ' disabled'}>Auto</button>
                    </div>
                </div>
            `;
            bindTitleControl(item);
        }

        function renderEmptyState() {
            if (powerToysUnavailable()) {
                const empty = document.createElement('div');
                const settingsPath = catalog.availability?.settingsPath || '';
                empty.className = 'empty';
                empty.innerHTML = `
                    <div class="empty-title">PowerToys not found</div>
                    <div class="empty-copy">Install PowerToys or open it once, then refresh this catalog.</div>
                    ${settingsPath ? `<div class="empty-path">${escapeHtml(settingsPath)}</div>` : ''}
                    <div class="empty-actions">
                        <a class="empty-link" href="${escapeHtml(powerToysInstallUrl())}" target="_blank" rel="noreferrer">Install PowerToys</a>
                        <button class="small-button" type="button" data-refresh-catalog>Refresh</button>
                    </div>
                `;
                const refresh = empty.querySelector('[data-refresh-catalog]');
                if (refresh) {
                    refresh.addEventListener('click', requestCatalog);
                }
                return empty;
            }

            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = (catalog.items || []).length ? 'No commands match this filter.' : 'No PowerToys commands found.';
            return empty;
        }

        function renderFilters() {
            filtersNode.innerHTML = '';
            const counts = countByKind();
            for (const filter of filters) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `filter${activeFilter === filter.id ? ' active' : ''}`;
                const count = filter.id === 'all' ? (catalog.items || []).length : (counts[filter.id] || 0);
                button.textContent = `${filter.label} ${count}`;
                button.addEventListener('click', function() {
                    activeFilter = filter.id;
                    render();
                });
                filtersNode.appendChild(button);
            }
        }

        function renderItem(item, selected, currentOnly) {
            const row = document.createElement('label');
            row.className = `item${selected ? ' selected' : ''}`;
            row.title = item.title;
            row.tabIndex = 0;
            row.setAttribute('role', 'radio');
            row.setAttribute('aria-checked', selected ? 'true' : 'false');

            row.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    selectItem(item);
                }
            });

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'powertoysCommand';
            radio.value = item.id;
            radio.checked = selected;
            radio.className = 'item-radio';
            radio.addEventListener('change', function() {
                if (radio.checked) {
                    selectItem(item);
                }
            });

            const icon = document.createElement('div');
            icon.className = 'item-icon';
            icon.textContent = itemInitials(item);

            const main = document.createElement('div');
            main.className = 'item-main';

            const name = document.createElement('div');
            name.className = 'item-name';
            name.textContent = currentOnly ? `${item.title} (current)` : item.title;

            const meta = document.createElement('div');
            meta.className = 'item-meta';
            meta.textContent = itemMeta(item);

            main.appendChild(name);
            main.appendChild(meta);

            const badge = document.createElement('div');
            badge.className = 'badge';
            badge.textContent = kindLabel(item);

            row.appendChild(radio);
            row.appendChild(icon);
            row.appendChild(main);
            row.appendChild(badge);
            return row;
        }

        function selectItem(item) {
            if (settings.itemId === item.id) {
                return;
            }

            settings.itemId = item.id;
            settings.showTitle = true;
            settings.titleMode = 'auto';
            delete settings.customTitle;
            saveSettings();
            render();
        }

        function renderDetails(item) {
            if (!settings.itemId || !item) {
                details.hidden = true;
                details.innerHTML = '';
                return;
            }

            details.hidden = false;
            const behavior = behaviorText(item);
            details.innerHTML = `
                <div class="details-head">
                    <div class="item-icon">${escapeHtml(itemInitials(item))}</div>
                    <div>
                        <div class="details-title">Command details</div>
                        <div class="details-subtitle">${escapeHtml(item.group)} - ${escapeHtml(item.source)}</div>
                    </div>
                </div>
                <div class="details-body">
                    <div class="kv">
                        <div class="kv-label">Type</div>
                        <div class="kv-value">${escapeHtml(kindLabel(item))}</div>
                    </div>
                    ${item.hotkeyText ? detailRow('Shortcut', item.hotkeyText) : ''}
                    ${item.keyword ? detailRow('Alias', item.keyword) : ''}
                    ${item.description ? detailRow('Source', item.description) : ''}
                    <div class="kv">
                        <div class="kv-label">Behavior</div>
                        <div class="kv-value">${escapeHtml(behavior)}</div>
                    </div>
                </div>
            `;
        }

        function bindTitleControl(item) {
            const titleInput = document.getElementById('titleInput');
            const resetTitleBtn = document.getElementById('resetTitleBtn');
            const showTitleInput = document.getElementById('showTitleInput');
            if (!titleInput || !resetTitleBtn || !showTitleInput) return;

            showTitleInput.addEventListener('change', function() {
                settings.showTitle = showTitleInput.checked;
                titleInput.disabled = !showTitleInput.checked;
                resetTitleBtn.disabled = !canResetTitle();
                saveSettings();
            });

            titleInput.addEventListener('input', function() {
                settings.showTitle = true;
                settings.titleMode = 'custom';
                settings.customTitle = titleInput.value;
                showTitleInput.checked = true;
                titleInput.disabled = false;
                resetTitleBtn.disabled = false;
                scheduleTitleSave();
            });

            resetTitleBtn.addEventListener('click', function() {
                settings.showTitle = true;
                settings.titleMode = 'auto';
                delete settings.customTitle;
                showTitleInput.checked = true;
                titleInput.value = item.shortTitle;
                titleInput.disabled = false;
                resetTitleBtn.disabled = true;
                saveSettings();
            });
        }

        function scheduleTitleSave() {
            if (titleSaveTimer) {
                clearTimeout(titleSaveTimer);
            }

            titleSaveTimer = setTimeout(function() {
                saveSettings();
            }, 180);
        }

        function displayTitle(item) {
            if (settings.titleMode === 'custom') {
                return settings.customTitle || '';
            }

            return item.shortTitle;
        }

        function titleVisible() {
            return settings.showTitle !== false;
        }

        function canResetTitle() {
            return settings.showTitle === false || settings.titleMode === 'custom';
        }

        function filteredItems() {
            const query = searchBox.value.trim().toLowerCase();
            return (catalog.items || []).filter(item => {
                if (activeFilter !== 'all' && itemKind(item) !== activeFilter) return false;
                if (!query) return true;
                return [
                    item.title,
                    item.group,
                    item.source,
                    item.hotkeyText,
                    item.keyword,
                    item.description,
                    kindLabel(item)
                ].filter(Boolean).join(' ').toLowerCase().includes(query);
            });
        }

        function countByKind() {
            return (catalog.items || []).reduce((acc, item) => {
                const kind = itemKind(item);
                acc[kind] = (acc[kind] || 0) + 1;
                return acc;
            }, {});
        }

        function itemKind(item) {
            if (item.group === 'Quick Access') return 'utility';
            if (item.group === 'PowerToys Hotkeys') return 'hotkey';
            if (item.group === 'PowerToys Run') return 'run';
            if (item.group === 'Command Palette') return 'cmdpal';
            if (item.group === 'Keyboard Manager') return 'keyboard';
            return 'utility';
        }

        function kindLabel(item) {
            const kind = itemKind(item);
            if (kind === 'utility') return 'Utility';
            if (kind === 'hotkey') return item.execution?.eventName ? 'Event' : 'Hotkey';
            if (kind === 'run') return 'Run alias';
            if (kind === 'cmdpal') return item.keyword ? 'CmdPal alias' : 'CmdPal';
            if (kind === 'keyboard') return 'Mapping';
            return 'Command';
        }

        function itemMeta(item) {
            const parts = [item.group];
            if (item.keyword) parts.push(`Alias "${item.keyword}"`);
            else if (item.hotkeyText) parts.push(item.hotkeyText);
            else if (item.execution?.eventName) parts.push('PowerToys event');
            return parts.join(' - ');
        }

        function behaviorText(item) {
            if (item.execution?.inputText && item.group === 'PowerToys Run') {
                return `Opens PowerToys Run, clears the query, then types "${item.execution.inputText}"`;
            }

            if (item.execution?.inputText && item.group === 'Command Palette') {
                return `Opens Command Palette, clears the query, then types "${item.execution.inputText}"`;
            }

            if (item.execution?.eventName && item.execution?.hotkey) {
                return `Signals PowerToys. If the event is unavailable, falls back to ${item.hotkeyText}.`;
            }

            if (item.execution?.eventName) {
                return 'Signals the matching PowerToys utility.';
            }

            if (item.execution?.hotkey) {
                return `Sends ${item.hotkeyText}.`;
            }

            return 'No executable action is currently available.';
        }

        function itemInitials(item) {
            const kind = itemKind(item);
            if (kind === 'run') return 'RUN';
            if (kind === 'cmdpal') return 'CP';
            if (kind === 'keyboard') return 'KB';
            if (kind === 'hotkey') return 'HK';

            return item.title
                .split(/\s+/)
                .filter(Boolean)
                .slice(0, 2)
                .map(part => part[0])
                .join('')
                .toUpperCase()
                .slice(0, 3) || 'PT';
        }

        function detailRow(label, value) {
            return `
                <div class="kv">
                    <div class="kv-label">${escapeHtml(label)}</div>
                    <div class="kv-value">${escapeHtml(value)}</div>
                </div>
            `;
        }

        function catalogStatusText() {
            if (powerToysUnavailable()) {
                return 'PowerToys not found';
            }

            const version = catalog.version ? `PowerToys ${catalog.version}` : 'PowerToys settings loaded';
            return `${version} - ${(catalog.items || []).length} synced`;
        }

        function powerToysUnavailable() {
            return catalog.availability?.status === 'not-found';
        }

        function powerToysInstallUrl() {
            return catalog.availability?.installUrl || 'https://github.com/microsoft/PowerToys/releases';
        }

        function isReady() {
            return websocket && websocket.readyState === 1 && actionInfo && uuid;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        searchBox.addEventListener('input', render);
        refreshBtn.addEventListener('click', requestCatalog);
        render();
    </script>
</body>
</html>
